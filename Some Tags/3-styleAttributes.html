<!DOCTYPE html>
<html lang="en-US">

<body>
    <!--Background Color-->
    <p style="background-color:powderblue;">This is a paragraph with a background color.</p>
    <!--Background color can also be set to body tag, thus making it apply to the entire page-->
    <br /><br />

    <!--Text Color-->
    <p style="color:blue;">This is a paragraph with blue text.</p>
    <br /><br />

    <!--Font family - Text Size -->
    <p style="font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif; font-size:18px">This is a
        paragraph with a specific font and size.</p>
    <br><br>

    <!--Text Alignment-->

    <p style="text-align:center;">This is a centered paragraph.</p>
    <br>
    <h3 style="text-align:center;">This is a centered heading</h3>

</body>

</html>
